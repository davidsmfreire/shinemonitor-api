      - {
          name: plantName,
          type: string,
          required: false,
          doc: "Fuzzy name match",
        }
      - { name: page, type: int, required: false, doc: "Page index from 0" }
      - { name: pagesize, type: int, required: false, doc: "1-50; default 1" }
    returns: "{total, page, pagesize, plant: [...]}"

  - action: queryPlantInfo
