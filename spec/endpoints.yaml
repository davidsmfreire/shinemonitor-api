# Machine-readable catalog of ShineMonitor REST endpoints.
#
# Source: https://api.shinemonitor.com/ — each entry's `doc` points to
# the upstream HTML page for the endpoint. Codegen reads this file and
# produces:
#   - python/shinemonitor_api/_actions.py (URL builders + parsers)
#   - python/shinemonitor_api/_actions_methods.py (mixin with .{action}() methods)
#   - mock-server/shinemonitor_mock/_actions.py (canned-response handlers)
#
# Population is incremental — chapters are added one at a time.
# Re-run `python scripts/codegen.py` after edits.
#
# Per-endpoint shape:
#   action: <vendor action string>
#   chapter: <vendor chapter id, e.g. "5">
#   doc: <relative URL on the vendor docs site>
#   auth: bool                # whether token+secret signing is required
#   params:
#     - {name: str, type: str, required: bool, doc: str}
#   returns: free-form description of `dat` payload — not yet a strict schema
#   mock_response:            # canned response served by the mock; `dat` only
#     <free-form JSON>

version: 1
base_action_template: "&action={action}"
default_suffix_required:
  true # all non-auth requests append the standard
  # &i18n=&lang=&source=&_app_*_= context

endpoints:
  # ---------------------------------------------------------------------
  # Chapter 2 — account management
  # ---------------------------------------------------------------------
  - action: authSource
    chapter: "2"
    doc: chapter2/auth.html
    auth: false
    params:
      - { name: usr, type: string, required: true, doc: "Account username" }
      - {
          name: company-key,
          type: string,
          required: true,
          doc: "Vendor identifier",
        }
    sign: "SHA-1(salt + SHA-1(pwd) + base_action)"
    returns: "{token, secret, expire, role}"

  - action: auth
    chapter: "2"
    doc: chapter2/auth.html
    auth: false
    params:
      - { name: usr, type: string, required: true, doc: "Account username" }
      - {
          name: company-key,
          type: string,
          required: true,
          doc: "Vendor identifier",
        }
    sign: "SHA-1(salt + SHA-1(pwd) + base_action)"
    returns: "{token, secret, expire, role}"

  - action: updateToken
    chapter: "2"
    doc: chapter2/updateToken.html
    auth: true
    params: []
    returns: "{token, secret, expire}"

  - action: queryAccountInfo
    chapter: "2"
    doc: chapter2/queryAccountInfo.html
    auth: true
    params: []
    returns: "{usr, name, mobile, email, role, ...}"

  - action: updatePassword
    chapter: "2"
    doc: chapter2/updatePassword.html
    auth: true
    params:
      - {
          name: oldPwd,
          type: string,
          required: true,
          doc: "SHA-1 of old password",
        }
      - {
          name: newPwd,
          type: string,
          required: true,
          doc: "SHA-1 of new password",
        }
    returns: "(empty on success)"

